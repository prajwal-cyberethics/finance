<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Public Sans', sans-serif; background-color: #0f172a; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { text-align: center; margin: 40px 0; }
        .header h1 { color: #38bdf8; font-size: 2.2rem; margin-bottom: 10px; }
        .header p { color: #94a3b8; font-size: 1.1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 900px; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; text-decoration: none; color: white; border: 1px solid #334155; transition: 0.3s; display: flex; flex-direction: column; gap: 10px; }
        .card:hover { border-color: #38bdf8; transform: translateY(-5px); background: #1e293b; box-shadow: 0 10px 30px -10px rgba(56, 189, 248, 0.2); }
        .card .icon { font-size: 2.5rem; margin-bottom: 10px; }
        .card h2 { margin: 0; color: #f8fafc; font-size: 1.5rem; }
        .card p { margin: 0; color: #94a3b8; font-size: 1rem; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 Master Dashboard</h1>
        <p>Personal Finance & Learning Vault</p>
    </div>
    <div class="grid">
        <a href="Finance/" class="card">
            <span class="icon">💰</span>
            <h2>Finance</h2>
            <p>Investment portfolios, expense tracking, and savings goals.</p>
        </a>
        <a href="Learning/" class="card">
            <span class="icon">🎓</span>
            <h2>Learning</h2>
            <p>Cybersecurity research, AI notes, and Technical Writing IP.</p>
        </a>
    </div>
</body>
</html>
